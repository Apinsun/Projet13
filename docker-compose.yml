services:
  # ──────────────────────────────────────
  # Backend FastAPI
  # ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chess-backend
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
      - LICHESS_API_TOKEN=${LICHESS_API_TOKEN:-}
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - MONGO_URI=mongodb://mongo:27017
      - STOCKFISH_PATH=/usr/games/stockfish
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - chess-network

  # ──────────────────────────────────────
  # Milvus (base vectorielle)
  # ──────────────────────────────────────
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - chess-network

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "${MINIO_PORT:-9001}:9001"
      - "${MINIO_CONSOLE_PORT:-9000}:9000"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - chess-network

  milvus-standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.4.17
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_GRPC_PORT:-9091}:9091"
    depends_on:
      - etcd
      - minio
    networks:
      - chess-network

  # ──────────────────────────────────────
  # MongoDB
  # ──────────────────────────────────────
  mongo:
    container_name: chess-mongo
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chess-network

  # ──────────────────────────────────────
  # Frontend Angular
  # ──────────────────────────────────────
  frontend:
    container_name: chess-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    depends_on:
      - backend
    networks:
      - chess-network

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  mongo_data:

networks:
  chess-network:
    driver: bridge
